<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link href="/registro_venta/registro_venta.css" rel="stylesheet"/>
</head>
<body>
<div class="layout">
  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="user-block">
      <div class="avatar">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <div class="notif-dot"></div>
      </div>
      <div style="flex:1">
        <div class="user-name">Usuario 1</div>
        <div class="user-handle">@usuarioprueba</div>
      </div>
      <svg class="chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>

    <nav class="nav">
      <a class="nav-item" href="/inicio.html/inicio.html">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Inicio
      </a>
      <a class="nav-item" href="/producto ventas/productos_venta.html">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        Producto de ventas (graficos)
      </a>
      <a class="nav-item active" href="/registro_venta/registro_ventas.html">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Registro de ventas Anuales
      </a>
      <a class="nav-item" href="/gestion_usuario/getion_usuario.html">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Usuario
      </a>
    </nav>

    <div class="nav-bottom">
      <a href="#">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Configuracion
      </a>
      <a href="/login/login.html" onclick="localStorage.clear()">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar Sesion
      </a>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <main class="main">

    <!-- Header -->
    <div class="header-row">
      <div style="display:flex;align-items:center;gap:16px;">
        <div class="title-row">
          <div class="title-bar"></div>
          <div class="page-title">Registro de ventas Anuales</div>
        </div>
        <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <div class="logo-badge">
        <img src="/imagen/LOGO_CAPCOB_PROYECTOAP.png" alt="CAPCOB logo"/>
        CAPCOB
      </div>
    </div>

    <!-- Table -->
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>MES</th>
            <th>VENTAS</th>
            <th>CRECIMIENTO</th>
            <th>%FRENTE AL<br>MES ANTERIOR</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- rows injected by JS -->
        </tbody>
      </table>
    </div>

    <!-- Generar recibo -->
    <button class="btn-generar" onclick="generarRecibo()">Generar Recibo</button>

  </main>
</div>

<!-- Modal recibo -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="cerrarModal()">✕</button>
    <h3>🧾 Recibo Anual</h3>
    <p>Resumen de ventas del año actual</p>
    <div id="modalContent"></div>
    <button class="modal-btn" onclick="window.print()">Imprimir / Guardar PDF</button>
  </div>
</div>

<script src="registro.js"></script>
</body>
</html>
